# wrangler.ks.toml — line-harness-ks (TRINA) 本番デプロイ用の実 config を永続化。
#
# WHY (findings MEDIUM/reusability): 本番デプロイは /tmp の ephemeral clone で
# hand-patch した config で実行され、その config はどの repo にも残らず消失していた。
# 実際に使う値をここに固定し、二度と考古学的発掘をしないための正本。
#
# 秘密は含まない。ADMIN_API_KEY / API_KEY / LINE_* / WORKER_URL は `wrangler secret put`
# で Cloudflare 側に保存済み (このファイルには絶対に書かない)。
#
# デプロイ (cron は owner 承認 2026-07-11 で解禁済み = 自動送信トリガー有効。deploy 前に D1 仕掛品 0 件確認):
#   cd apps/worker && pnpm build
#   CLOUDFLARE_API_TOKEN=... CLOUDFLARE_ACCOUNT_ID=... \
#     npx wrangler deploy dist/line_harness/index.js --config wrangler.ks.toml
#
# [triggers] crons は owner 承認 2026-07-11 で解禁済み (case line-crons-enable)。
#    正定義 = ["*/5 * * * *", "0 */6 * * *"] の 2 本 (5分tick=配信/リマインダー/復旧/token refresh、
#    6h tick=booking/event expirer)。6h 式は index.ts:708,736 の event.cron === '0 */6 * * *' 判定と
#    一致必須。cron 追加/変更時は expirer 判定と scheduled() 本体 (index.ts:642-755) を必ず確認。

name = "line-harness-ks"
main = "dist/line_harness/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = true
account_id = "8afbae04688d10af42d2d4ab5a323019"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "line-harness-ks"
database_id = "8367d856-4aa6-4a5a-9d76-6d8cf4997284"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images-ks"

# owner 承認 2026-07-11 で crons 解禁済み (case line-crons-enable)。5分tick=step/scheduled/reminder
# 配信・stuck 復旧・queue・health・token refresh・insight・booking/event reminders、6h tick=booking/event
# expirer。6h 式は index.ts:708,736 の event.cron === '0 */6 * * *' 判定と一致必須 (変えると expirer が永久に走らない)。
[triggers]
crons = ["*/5 * * * *", "0 */6 * * *"]

[vars]
WORKER_NAME = "line-harness-ks"
WORKER_PUBLIC_URL = "https://line-harness-ks.web-8af.workers.dev"
ADMIN_PAGES_PROJECT = "line-harness-ks-admin"
ADMIN_PUBLIC_URL = "https://line-harness-ks-admin.pages.dev"
# ADMIN_ORIGIN + ADMIN_ALLOW_CROSS_SITE=true が無いと *.pages.dev↔*.workers.dev の
# クロスサイト httpOnly Cookie 認証が壊れ、管理画面にログインできなくなる (0.15.0)。
ADMIN_ORIGIN = "https://line-harness-ks-admin.pages.dev"
ADMIN_ALLOW_CROSS_SITE = "true"
LIFF_PAGES_PROJECT = "line-harness-ks-liff"
LIFF_PUBLIC_URL = "https://line-harness-ks-liff.pages.dev"
D1_DATABASE_ID = "8367d856-4aa6-4a5a-9d76-6d8cf4997284"
CF_ACCOUNT_ID = "8afbae04688d10af42d2d4ab5a323019"
# formaloo-auto-pull: 定義 drift の定期検知 (6h cron)。detection+通知 (badge/履歴) は ON で走るが、
#   自動反映 (auto-apply) は AUTO_APPLY="false" で dark-ship (通知のみ = 案 B)。owner が案 A を選んだら
#   AUTO_APPLY を "true" に flip するだけ (通知/バッジ/監査は OFF でも動く)。ENABLED="false" で job 自体を即停止 (rollback)。
FORMALOO_DRIFT_ENABLED = "true"
FORMALOO_DRIFT_AUTO_APPLY = "false"
# FAQ 自動応答ボット (Phase A) の全体スイッチ。既定 OFF = webhook text 処理は byte-identical。
# 有効化 (= "true") は owner 立会テスト時のみ (cron ON と同じ回で可)。ここを "true" にすると
# アカウント別設定 (account_settings key='faq_bot' enabled) と AND で自動返信が発火する。
FAQ_BOT_ENABLED = "true"
# fr-id-capture-fix (2026-07-18): fr_id system field auto-push は既定 ON (qBSQdjyz 実測 PASS 済)。
#   fr_name は実名 PII のため owner 未確認 → 保守的に "1" (無効) 固定。owner が PII 用途/保持方針を
#   承認したら "false" or 削除で有効化 (docs/BACKLOG.md「fr-id-capture-fix」節参照)。
FORMALOO_FR_NAME_AUTOPUSH_DISABLE = "0"
MANIFEST_URL = "https://github.com/Shudesu/line-harness-oss/releases/latest/download/release-manifest.json"
# ── FAQ AI (Phase B go-live / owner 立会 §1) additive。生成/埋め込みモデルは env 注入 (literal 焼き込みなし)。
#    非 deprecated 実確認済 (2026-07-11 docs 200)・埋め込み次元 1024 は live 実測 (data[1][1024]) 済。
#    FAQ_BOT_ENABLED は "false" のまま (この追記は「部品の用意」= オンとは別段階)。
AI_MODEL_ID = "@cf/meta/llama-3.1-8b-instruct-fast"
AI_EMBED_MODEL_ID = "@cf/qwen/qwen3-embedding-0.6b"
AI_EMBED_NEURON_PER_MTOK = "3000"
AI_CHUNK_RELEVANCE_FLOOR = "0.70"
# 弾L Phase B (form-edit-mail-phase-b / 2026-07-19): Resend 編集メール送付。全て env AND gate
#   (ENABLED="true" ∧ RESEND_API_KEY secret 設定 ∧ FROM 設定 ∧ form.allow_edit_mail=1)。
#   送信元は owner 決定 (2026-07-19) でテスト稼働= testline.skdcc.jp。後々本番アドレスへ差替予定
#   (ハードコードなし・env 変更のみで切替可能)。
FORM_EDIT_MAIL_ENABLED = "true"
FORM_EDIT_MAIL_FROM = "受付 <no-reply@testline.skdcc.jp>"

# Workers AI binding (env.AI.run(modelId, ...))。B-1 WorkersAiProvider が使用。
[ai]
binding = "AI"

# Vectorize index binding (env.VECTORIZE)。B-4 chunks live RAG。index は先に provisioning 済
# (ks-knowledge-chunks / 1024 dim / cosine / metadata index=line_account_id)。
[[vectorize]]
binding = "VECTORIZE"
index_name = "ks-knowledge-chunks"
